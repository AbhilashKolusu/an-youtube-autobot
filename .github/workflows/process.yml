name: Process Episode

on:
  push:
    paths:
      - 'recordings/host/**'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run pipeline
      run: python scripts/watch.py  # Or trigger specific script